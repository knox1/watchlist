<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d0d;--bg2:#161616;--card:#1c1c1e;--accent:#6366f1;--accent2:#818cf8;--glow:rgba(99,102,241,0.3);--txt:#f5f5f7;--txt2:#a1a1aa;--muted:#71717a;--border:#27272a;--danger:#ef4444;--r:16px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
header{background:rgba(13,13,13,0.85);backdrop-filter:blur(20px);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-actions{display:flex;gap:12px;align-items:center}
.search-box{padding:10px 18px;border-radius:30px;border:1px solid var(--border);background:var(--bg2);color:var(--txt);width:260px;font-size:.85rem;font-family:inherit;transition:.3s}
.search-box:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
.btn-upload{padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:30px;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:.3s}
.btn-upload:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 25px var(--glow)}
.genre-filter{padding:16px 32px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.genre-filter::-webkit-scrollbar{display:none}
.genre-tag{padding:8px 18px;border-radius:30px;background:var(--bg2);border:1px solid var(--border);color:var(--txt2);cursor:pointer;white-space:nowrap;font-size:.8rem;font-weight:500;font-family:inherit;transition:.2s}
.genre-tag:hover{color:var(--txt);border-color:var(--muted)}
.genre-tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.movies-section{padding:24px 32px}
.section-title{font-size:1.2rem;font-weight:700;margin-bottom:20px}
.movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px}
.movie-card{background:var(--card);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.4s cubic-bezier(.25,.46,.45,.94);border:1px solid transparent;position:relative}
.movie-card:hover{transform:scale(1.05);border-color:var(--accent);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 30px var(--glow);z-index:10}
.movie-card:hover .play-overlay{opacity:1}
.movie-card:hover .movie-poster img{transform:scale(1.1)}
.movie-poster{width:100%;height:260px;background:var(--bg2);position:relative;overflow:hidden}
.movie-poster img{width:100%;height:100%;object-fit:cover;transition:.4s}
.movie-poster .no-poster{display:flex;align-items:center;justify-content:center;height:100%;font-size:3rem;color:var(--muted)}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.3s}
.play-btn{width:50px;height:50px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 20px var(--glow)}
.movie-info{padding:14px}
.movie-title{font-size:.9rem;font-weight:600;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.movie-meta{display:flex;justify-content:space-between;align-items:center}
.movie-genre{background:rgba(99,102,241,.15);color:var(--accent2);padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:500}
.movie-size{color:var(--muted);font-size:.75rem}
</style>
</head>
<body>
<header>
<div class="logo"><span>🎬</span><h1>Watchlist</h1></div>
<div class="header-actions">
<input type="text" class="search-box" id="searchInput" placeholder="Search movies...">
<button class="btn-upload" id="btnUpload">+ Upload</button>
</div>
</header>
<div class="genre-filter" id="genreFilter">
<span class="genre-tag active" data-genre="all">All</span>
<span class="genre-tag" data-genre="Action">Action</span>
<span class="genre-tag" data-genre="Comedy">Comedy</span>
<span class="genre-tag" data-genre="Drama">Drama</span>
<span class="genre-tag" data-genre="Horror">Horror</span>
<span class="genre-tag" data-genre="Sci-Fi">Sci-Fi</span>
<span class="genre-tag" data-genre="Thriller">Thriller</span>
<span class="genre-tag" data-genre="Romance">Romance</span>
<span class="genre-tag" data-genre="Documentary">Documentary</span>
<span class="genre-tag" data-genre="Animation">Animation</span>
</div>
<section class="movies-section">
<h2 class="section-title" id="sectionTitle">All Movies</h2>
<div class="movie-grid" id="movieGrid"></div>
<div id="emptyState" style="display:none;text-align:center;padding:80px 20px;color:var(--muted)">
<div style="font-size:4rem;margin-bottom:16px">🎥</div>
<h3 style="font-size:1.3rem;color:var(--txt2);margin-bottom:8px">No movies yet</h3>
<p style="font-size:.9rem">Upload your first movie to get started</p>
</div>
</section>

<!-- Player Modal -->
<div class="modal-overlay" id="playerModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;justify-content:center;align-items:center;flex-direction:column;backdrop-filter:blur(10px)">
<div style="width:90%;max-width:1100px;position:relative">
<button id="playerClose" style="position:absolute;top:-50px;right:0;background:var(--card);border:1px solid var(--border);color:#fff;font-size:1.2rem;cursor:pointer;padding:8px 14px;border-radius:10px">&times;</button>
<video id="videoPlayer" controls style="width:100%;border-radius:var(--r);background:#000;max-height:70vh"></video>
<div style="margin-top:16px;display:flex;justify-content:space-between;align-items:center">
<span id="playerTitle" style="font-size:1.2rem;font-weight:700"></span>
<div style="display:flex;gap:10px">
<button id="btnDownload" style="padding:9px 20px;border-radius:30px;border:1px solid var(--border);background:var(--card);color:var(--txt);cursor:pointer;font-size:.8rem;font-weight:500;font-family:inherit">⬇ Download</button>
<button id="btnDelete" style="padding:9px 20px;border-radius:30px;border:1px solid var(--border);background:var(--card);color:var(--txt);cursor:pointer;font-size:.8rem;font-weight:500;font-family:inherit">🗑 Delete</button>
</div>
</div>
</div>
</div>

<!-- Upload Modal -->
<div class="upload-modal" id="uploadModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(10px)">
<div style="background:var(--bg2);padding:36px;border-radius:var(--r);width:90%;max-width:480px;border:1px solid var(--border)">
<h2 style="margin-bottom:24px;font-size:1.4rem;font-weight:700">🎬 Upload Movie</h2>
<form id="uploadForm">
<div style="margin-bottom:16px">
<label style="display:block;margin-bottom:6px;font-size:.8rem;color:var(--txt2)">Movie File *</label>
<div id="movieFileWrapper" style="border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:.2s;position:relative">
<p style="color:var(--muted);font-size:.85rem">📁 Click to select movie file</p>
<p id="movieFileName" style="color:var(--accent);margin-top:6px;font-size:.8rem"></p>
<input type="file" id="movieFile" accept="video/*" required style="position:absolute;inset:0;opacity:0;cursor:pointer">
</div>
</div>
<div style="margin-bottom:16px">
<label style="display:block;margin-bottom:6px;font-size:.8rem;color:var(--txt2)">Title</label>
<input type="text" id="movieTitle" placeholder="Movie title" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--txt);font-size:.9rem;font-family:inherit">
</div>
<div style="margin-bottom:16px">
<label style="display:block;margin-bottom:6px;font-size:.8rem;color:var(--txt2)">Genre</label>
<select id="movieGenre" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--txt);font-size:.9rem;font-family:inherit">
<option value="Uncategorized">Select genre...</option>
<option value="Action">Action</option><option value="Comedy">Comedy</option><option value="Drama">Drama</option>
<option value="Horror">Horror</option><option value="Sci-Fi">Sci-Fi</option><option value="Thriller">Thriller</option>
<option value="Romance">Romance</option><option value="Documentary">Documentary</option><option value="Animation">Animation</option>
</select>
</div>
<div style="margin-bottom:16px">
<label style="display:block;margin-bottom:6px;font-size:.8rem;color:var(--txt2)">Poster Image (optional)</label>
<div style="border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;position:relative">
<p style="color:var(--muted);font-size:.85rem">🖼 Click to select poster</p>
<p id="posterFileName" style="color:var(--accent);margin-top:6px;font-size:.8rem"></p>
<input type="file" id="posterFile" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer">
</div>
</div>
<div id="uploadProgress" style="display:none;margin-top:16px">
<div style="width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
<div id="progressFill" style="height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);width:0%;transition:.3s;border-radius:3px"></div>
</div>
<p id="progressText" style="margin-top:6px;font-size:.8rem;color:var(--muted);text-align:center">Uploading... 0%</p>
</div>
<div style="display:flex;gap:10px;margin-top:24px">
<button type="button" id="btnCancelUpload" style="padding:12px 24px;background:none;color:var(--txt2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:.9rem;font-family:inherit">Cancel</button>
<button type="submit" id="btnSubmitUpload" style="flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;font-family:inherit">Upload</button>
</div>
</form>
</div>
</div>

<script>
let movies=[],currentMovie=null,currentFilter='all';
const movieGrid=document.getElementById('movieGrid'),emptyState=document.getElementById('emptyState'),searchInput=document.getElementById('searchInput'),playerModal=document.getElementById('playerModal'),uploadModal=document.getElementById('uploadModal'),videoPlayer=document.getElementById('videoPlayer');

async function loadMovies(){try{const r=await fetch('/api/movies');movies=await r.json();renderMovies()}catch(e){console.error(e)}}

function renderMovies(){
let f=movies;
if(currentFilter!=='all')f=f.filter(m=>m.genre===currentFilter);
const q=searchInput.value.toLowerCase();
if(q)f=f.filter(m=>m.title.toLowerCase().includes(q)||m.description.toLowerCase().includes(q));
if(!f.length){movieGrid.innerHTML='';emptyState.style.display='block';return}
emptyState.style.display='none';
movieGrid.innerHTML=f.map(m=>`
<div class="movie-card" onclick="openPlayer('${m.id}')">
<div class="movie-poster">
${m.poster?`<img src="/posters/${m.poster}" alt="${m.title}">`:`<div class="no-poster">🎬</div>`}
<div class="play-overlay"><div class="play-btn">▶</div></div>
</div>
<div class="movie-info">
<div class="movie-title">${m.title}</div>
<div class="movie-meta"><span class="movie-genre">${m.genre}</span><span class="movie-size">${formatSize(m.size)}</span></div>
</div>
</div>`).join('')}

function formatSize(b){if(b<1048576)return(b/1024).toFixed(1)+' KB';if(b<1073741824)return(b/1048576).toFixed(1)+' MB';return(b/1073741824).toFixed(2)+' GB'}

function openPlayer(id){
currentMovie=movies.find(m=>m.id===id);if(!currentMovie)return;
document.getElementById('playerTitle').textContent=currentMovie.title;
videoPlayer.src='/stream/'+id;
playerModal.style.display='flex';document.body.style.overflow='hidden'}

document.getElementById('playerClose').onclick=()=>{videoPlayer.pause();videoPlayer.src='';playerModal.style.display='none';document.body.style.overflow=''}
document.getElementById('btnDownload').onclick=()=>{if(currentMovie)window.location.href='/download/'+currentMovie.id}
document.getElementById('btnDelete').onclick=async()=>{if(!currentMovie||!confirm('Delete "'+currentMovie.title+'"?'))return;await fetch('/api/movies/'+currentMovie.id,{method:'DELETE'});videoPlayer.pause();videoPlayer.src='';playerModal.style.display='none';document.body.style.overflow='';showToast('Deleted');loadMovies()}

document.getElementById('btnUpload').onclick=()=>{uploadModal.style.display='flex'}
document.getElementById('btnCancelUpload').onclick=()=>{uploadModal.style.display='none';document.getElementById('uploadForm').reset();document.getElementById('movieFileName').textContent='';document.getElementById('posterFileName').textContent=''}

document.getElementById('movieFile').onchange=e=>{const n=e.target.files[0]?.name||'';document.getElementById('movieFileName').textContent=n;if(n&&!document.getElementById('movieTitle').value)document.getElementById('movieTitle').value=n.replace(/\.[^/.]+$/,'')}
document.getElementById('posterFile').onchange=e=>{document.getElementById('posterFileName').textContent=e.target.files[0]?.name||''}

document.getElementById('uploadForm').onsubmit=async e=>{
e.preventDefault();
const f=document.getElementById('movieFile').files[0];if(!f)return;
const fd=new FormData();
fd.append('movie',f);
fd.append('title',document.getElementById('movieTitle').value||f.name);
fd.append('genre',document.getElementById('movieGenre').value);
const p=document.getElementById('posterFile').files[0];if(p)fd.append('poster',p);
const prog=document.getElementById('uploadProgress'),fill=document.getElementById('progressFill'),txt=document.getElementById('progressText'),btn=document.getElementById('btnSubmitUpload');
prog.style.display='block';btn.disabled=true;
const xhr=new XMLHttpRequest();
xhr.upload.onprogress=e=>{if(e.lengthComputable){const pct=Math.round(e.loaded/e.total*100);fill.style.width=pct+'%';txt.textContent='Uploading... '+pct+'%'}};
xhr.onload=()=>{if(xhr.status===201){uploadModal.style.display='none';document.getElementById('uploadForm').reset();document.getElementById('movieFileName').textContent='';document.getElementById('posterFileName').textContent='';prog.style.display='none';fill.style.width='0%';btn.disabled=false;showToast('Uploaded!');loadMovies()}};
xhr.onerror=()=>{showToast('Upload failed');prog.style.display='none';btn.disabled=false};
xhr.open('POST','/api/movies');xhr.send(fd)}

document.getElementById('genreFilter').onclick=e=>{if(e.target.classList.contains('genre-tag')){document.querySelectorAll('.genre-tag').forEach(t=>t.classList.remove('active'));e.target.classList.add('active');currentFilter=e.target.dataset.genre;document.getElementById('sectionTitle').textContent=currentFilter==='all'?'All Movies':currentFilter;renderMovies()}}

searchInput.oninput=renderMovies;
document.onkeydown=e=>{if(e.key==='Escape'){if(playerModal.style.display==='flex'){videoPlayer.pause();videoPlayer.src='';playerModal.style.display='none';document.body.style.overflow=''}if(uploadModal.style.display==='flex')uploadModal.style.display='none'}}

function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:30px;right:30px;padding:14px 24px;background:var(--card);border:1px solid var(--accent);border-radius:12px;color:#fff;font-size:.9rem;z-index:2000;animation:fadeIn .3s';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}

loadMovies();
</script>
</body>
</html>
